<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watchlist</title>
    <link rel="stylesheet" href="desktop.css" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="adaptive.css" />
  </head>
  <body>
    <section id="header" class="section-grid">
      <div class="header-content">
        <a href="index.html"> <p class="logo light">Cozy movies info</p></a>
        <a href="search.html"
          ><button class="secondary-button beige">Find more movies</button></a
        >
      </div>
    </section>

    <section id="watchlist">
      <h2 class="light">Your watchlist</h2>
      <div class="watchlist-sort-wrap">
        <label for="watchlist-sort-trigger" class="light-gray"
          ><h3>Sort by year</h3></label
        >
        <input type="hidden" id="watchlist-sort-year" value="desc" />
        <div id="watchlist-sort-dropdown" class="watchlist-sort-dropdown">
          <button
            id="watchlist-sort-trigger"
            class="watchlist-sort"
            type="button"
            aria-haspopup="listbox"
            aria-expanded="false"
          >
            <span id="watchlist-sort-label">Newest first</span>
          </button>
          <ul
            class="watchlist-sort-menu"
            role="listbox"
            aria-label="Sort by year"
          >
            <li>
              <button
                class="watchlist-sort-option"
                type="button"
                data-value="desc"
              >
                Newest first
              </button>
            </li>
            <li>
              <button
                class="watchlist-sort-option"
                type="button"
                data-value="asc"
              >
                Oldest first
              </button>
            </li>
          </ul>
        </div>
      </div>
      <div class="section-grid"></div>
    </section>

    <section class="footer">
      <p class="light">Created by Valeria C. and Ana Mihailov. DAW-241 CUTM</p>
    </section>

    <script src="api.js"></script>
    <script src="watchlist.js"></script>
  </body>
</html>
